<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mustafa ÇELİK | Gömülü Sistemler Mühendisi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- GENEL STİL AYARLARI (GPT Tasarımı Korundu) --- */
        :root {
            --bg-color: #0f172a;
            --bg-soft: #111827;
            --accent: #38bdf8; /* O sevdiğin neon mavi */
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-color: #e5e7eb;
            --text-soft: #9ca3af;
            --card-bg: #1e293b;
            --border-soft: #334155;
            --radius: 12px;
            --transition: 0.3s ease;
            --max-width: 1100px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0, #020617 60%, #000 100%);
            color: var(--text-color);
            line-height: 1.6;
        }

        a { color: inherit; text-decoration: none; transition: var(--transition); }
        img { max-width: 100%; display: block; }

        /* --- NAVBAR --- */
        header {
            position: sticky; top: 0; z-index: 50;
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }
        .nav-inner {
            max-width: var(--max-width); margin: 0 auto; padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--text-color); }
        .logo span { color: var(--accent); }
        
        nav ul { display: flex; gap: 1.5rem; list-style: none; }
        nav a { font-size: 0.9rem; color: var(--text-soft); font-weight: 500; }
        nav a:hover { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

        /* --- ANA YAPILAR --- */
        main { max-width: var(--max-width); margin: 0 auto; padding: 2rem 1.5rem 4rem; }
        section { margin-bottom: 5rem; scroll-margin-top: 100px; }
        
        .section-title {
            font-size: 1.8rem; margin-bottom: 2rem; color: var(--accent);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .section-title::after {
            content: ""; flex-grow: 1; height: 1px;
            background: linear-gradient(to right, var(--accent), transparent);
            margin-left: 1rem; opacity: 0.3;
        }

        /* --- HERO BÖLÜMÜ --- */
        .hero {
